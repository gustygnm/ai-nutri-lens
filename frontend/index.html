<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutri Lens - AI Nutrition Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            nutri: {
              A: '#16a34a', // green-600
              B: '#84cc16', // lime-500
              C: '#f97316', // orange-500
              D: '#dc2626', // red-600
            }
          }
        }
      }
    }
  </script>
  
  <!-- Load runtime environment variables (injected by Docker in Cloud Run) -->
  <script src="./env-config.js"></script>
  
  </head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 antialiased min-h-screen transition-colors duration-300">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
